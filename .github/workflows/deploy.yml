name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy changed files via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          # Get list of files changed in this commit
          # Fall back to all tracked files if there's only one commit (first deploy)
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git ls-files)
          fi

          echo "Files to deploy:"
          echo "$CHANGED"

          for file in $CHANGED; do
            # Skip sensitive / excluded files
            case "$file" in
              .git*|.github*|server.py|inject-biz-months.js|data.json|config.json|expenses/config.php|expenses/uploads/*|"")
                echo "Skipping: $file"
                continue
                ;;
            esac

            if [ -f "$file" ]; then
              echo "Uploading: $file"
              curl --retry 3 --ftp-create-dirs --silent --show-error \
                -T "$file" \
                "ftp://$FTP_HOST/public_html/$file" \
                --user "$FTP_USER:$FTP_PASS"
            fi
          done

          echo "Deploy complete."
